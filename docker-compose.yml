services:
  db:
    image: postgres:16-alpine
    container_name: pos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pos_restaurante}
      POSTGRES_USER: ${POSTGRES_USER:-pos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos_user} -d ${POSTGRES_DB:-pos_restaurante}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: pos-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://pos_user:change_me@db:5432/pos_restaurante}
      APP_NAME: ${APP_NAME:-pos-restaurante}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-["http://localhost:8081"]}
      MEDIA_ROOT: ${MEDIA_ROOT:-uploads}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      INITIAL_RESTAURANT_NAME: ${INITIAL_RESTAURANT_NAME:-El Tacazo}
      INITIAL_BUSINESS_NAME: ${INITIAL_BUSINESS_NAME:-El Tacazo}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
      INITIAL_ADMIN_FULL_NAME: ${INITIAL_ADMIN_FULL_NAME:-Administrador}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: pos-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  postgres_data:
